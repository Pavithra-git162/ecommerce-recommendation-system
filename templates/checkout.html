<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body {
    background: #f5f5f5;
    font-family: 'DM Sans', sans-serif;
}

/* Razorpay Card */
.payment-box {
    max-width: 400px;
    margin: 80px auto;
    background: #fff;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

/* Header */
.payment-header {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 15px;
}

/* UPI buttons */
.upi-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.upi-btn:hover {
    background: #f9f9f9;
}

/* Logos */
.upi-btn img {
    height: 28px;
}

/* Pay button */
.pay-btn {
    width: 100%;
    background: #3399cc;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 8px;
    margin-top: 15px;
    font-weight: bold;
}

/* Loader */
.loader {
    display: none;
    text-align: center;
    margin-top: 20px;
}

.loader img {
    width: 80px;
}

/* Success */
.success {
    display: none;
    text-align: center;
}

.success h4 {
    color: green;
}
</style>
</head>

<body>

<div class="payment-box">

    <div class="payment-header">
        Pay ₹{{ total }}
    </div>

    <p style="font-size:13px;color:#777;">Choose UPI App</p>

    <!-- REAL LOGOS -->
    <div class="upi-btn" onclick="selectUPI('gpay')">
        <span>Google Pay</span>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Google_Pay_Logo.svg">
    </div>

    <div class="upi-btn" onclick="selectUPI('phonepe')">
        <span>PhonePe</span>
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/PhonePe_Logo.svg">
    </div>

    <div class="upi-btn" onclick="selectUPI('paytm')">
        <span>Paytm</span>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Paytm_logo.png">
    </div>

    <button class="pay-btn" onclick="startPayment()">Proceed to Pay</button>

    <!-- Loader -->
    <div class="loader" id="loader">
        <img src="https://i.gifer.com/ZZ5H.gif">
        <p>Processing Payment...</p>
    </div>

    <!-- Success -->
    <div class="success" id="success">
        <h4> Payment Successful</h4>
        <p>Order placed successfully!</p>
        <a href="/" class="btn btn-success btn-sm mt-2">Go Home</a>
    </div>

</div>

<script>
let selected = null;

function selectUPI(app) {
    selected = app;
    alert(app + " selected");
}

function startPayment() {
    if (!selected) {
        alert("Please select UPI app");
        return;
    }

    document.getElementById('loader').style.display = 'block';

    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('success').style.display = 'block';
    }, 3000);
}
</script>

</body>
</html>
